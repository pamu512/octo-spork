services:
  redis:
    container_name: local-ai-redis

  searxng:
    container_name: local-ai-searxng
    ports:
      - "${SEARXNG_PORT:-8080}:8080"
    environment:
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY}

  postgres:
    container_name: local-ai-postgres
    image: docker.io/postgres:16-alpine
    restart: unless-stopped
    profiles: ["addons", "full"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-octo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-octo}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - ../../.local/data/postgres:/var/lib/postgresql/data
    networks:
      - agentic-seek-net

  frontend:
    container_name: local-ai-agentic-ui
    # Chrome/Chromedriver stack is reliable as amd64 on Apple Silicon; keep images native.
    platform: linux/amd64
    ports:
      - "${AGENTIC_FRONTEND_PORT:-3010}:3000"
    environment:
      - REACT_APP_BACKEND_URL=${REACT_APP_BACKEND_URL:-http://localhost:7777}

  backend:
    container_name: local-ai-agentic-api
    platform: linux/amd64
    ports:
      - "${AGENTIC_BACKEND_PORT:-7777}:${AGENTIC_BACKEND_PORT:-7777}"
    environment:
      - BACKEND_PORT=${AGENTIC_BACKEND_PORT:-7777}
      - DOCKER_INTERNAL_URL=http://host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  open-webui:
    container_name: local-ai-open-webui
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    ports:
      - "${OPEN_WEBUI_PORT:-3001}:8080"
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - ../../.local/data/open-webui:/app/backend/data
    networks:
      - agentic-seek-net
    profiles: ["addons", "full"]
    extra_hosts:
      - "host.docker.internal:host-gateway"

  n8n:
    container_name: local-ai-n8n
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:${N8N_PORT:-5678}/
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - ../../.local/data/n8n:/home/node/.n8n
    networks:
      - agentic-seek-net
    profiles: ["addons", "full"]
    extra_hosts:
      - "host.docker.internal:host-gateway"

  chromadb:
    container_name: local-ai-chromadb
    image: chromadb/chroma:latest
    restart: unless-stopped
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    environment:
      - ANONYMIZED_TELEMETRY=${CHROMA_ANONYMIZED_TELEMETRY:-FALSE}
    volumes:
      - ../../.local/data/chromadb:/chroma/chroma
    networks:
      - agentic-seek-net
    profiles: ["addons", "full"]
