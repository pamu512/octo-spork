  backend:
    labels:
      com.octospork.project: octo-spork-local-ai
  postgres:
    labels:
      com.octospork.project: octo-spork-local-ai
  open-webui:
    labels:
      com.octospork.project: octo-spork-local-ai
  n8n:
    labels:
      com.octospork.project: octo-spork-local-ai
  chromadb:
    labels:
      com.octospork.project: octo-spork-local-ai
  claude-agent:
    labels:
