name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - - name: Install Python dependencies
        run: |
          python3 -m pip install -r requirements.txt
          python3 -m pip install pytest

      - name: Run unit tests
        run: pytest tests/
